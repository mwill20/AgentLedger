services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: agentledger
      POSTGRES_PASSWORD: agentledger
      POSTGRES_DB: agentledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentledger:agentledger@db:5432/agentledger
      DATABASE_URL_SYNC: postgresql://agentledger:agentledger@db:5432/agentledger
      REDIS_URL: redis://redis:6379/0
      API_VERSION: 0.1.0
      API_KEYS: ${API_KEYS:-dev-local-only}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A crawler.worker:celery_app worker --loglevel=info --queues=celery,crawler
    environment:
      DATABASE_URL: postgresql+asyncpg://agentledger:agentledger@db:5432/agentledger
      DATABASE_URL_SYNC: postgresql://agentledger:agentledger@db:5432/agentledger
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A crawler.worker:celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://agentledger:agentledger@db:5432/agentledger
      DATABASE_URL_SYNC: postgresql://agentledger:agentledger@db:5432/agentledger
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
